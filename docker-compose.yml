services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: saviyax-chromadb
    ports:
      - "8002:8000"
    volumes:
      - ./backend/chroma_store:/chroma/chroma

  backend-user:
    build:
      context: ./backend
    container_name: saviyax-backend-user
    command: ["uvicorn", "app.main_user:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
    depends_on:
      - chromadb

  backend-admin:
    build:
      context: ./backend
    container_name: saviyax-backend-admin
    command: ["uvicorn", "app.main_admin:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - chromadb

  frontend:
    build:
      context: ./frontend
    container_name: saviyax-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_USER_API_URL=${VITE_USER_API_URL:-http://localhost:8000/api}
      - VITE_ADMIN_API_URL=${VITE_ADMIN_API_URL:-http://localhost:8001/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-user
      - backend-admin
