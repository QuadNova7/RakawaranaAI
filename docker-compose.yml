services:
  backend:
    build:
      context: ./backend
    container_name: saviyax-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_store:/app/chroma_store

  frontend:
    build:
      context: ./frontend
    container_name: saviyax-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
